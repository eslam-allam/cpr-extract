services:
  # The Redis store
  redis:
    image: redis:alpine
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 5s
      timeout: 3s
      retries: 5
    networks:
      - cpr_net

  # The Sanic Web API
  web:
    image: bahrain-cpr-extract:latest
    environment:
      - REDIS_HOST=redis
    ports:
      - "${HOST_PORT:-8000}:8000"
    depends_on:
      redis:
        condition: service_healthy
    healthcheck:
      test: ["CMD", "pixi", "run", "python", "-c", "import urllib.request; urllib.request.urlopen('http://localhost:8000/health')"]
      interval: 10s
      timeout: 5s
      retries: 3
      start_period: 5s
    networks:
      - cpr_net

  # The RQ Worker
  worker:
    image: bahrain-cpr-extract:latest
    environment:
      - OCR_SERVICE_URL=http://ocr-service:5000/predict
    depends_on:
      redis:
        condition: service_healthy
      web:
        condition: service_healthy
      ocr-service:
        condition: service_started
    command: ["rq", "worker", "default", "--url", "redis://redis:6379"]
    networks:
      - cpr_net
    mem_limit: 1g
    memswap_limit: 1g
    cpus: 0.5

  # The Isolated OCR Microservice
  ocr-service:
    image: bahrain-cpr-extract:latest
    command: ["python", "ocr_app.py"]
    restart: always 
    networks:
      - cpr_net
    mem_limit: 8g
    memswap_limit: 8g
    cpus: 2.0

networks:
  cpr_net:
    driver: bridge
