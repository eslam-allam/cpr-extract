services:
  # The Redis store
  redis:
    image: redis:alpine
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 5s
      timeout: 3s
      retries: 5
    networks:
      - cpr_net

  # The Sanic Web API
  web:
    image: eslamallam/bahrain-cpr-extract:0.0.5
    environment:
      - REDIS_HOST=redis
    ports:
      - "${HOST_PORT:-8000}:8000"
    depends_on:
      redis:
        condition: service_healthy
    healthcheck:
      test: ["CMD", "pixi", "run", "python", "-c", "import urllib.request; urllib.request.urlopen('http://localhost:8000/health')"]
      interval: 10s
      timeout: 5s
      retries: 3
      start_period: 5s
    networks:
      - cpr_net

  # The RQ Worker
  worker:
    image: eslamallam/bahrain-cpr-extract:0.0.5
    depends_on:
      redis:
        condition: service_healthy
      web:
        condition: service_healthy
    command: ["python", "start_worker.py"]
    networks:
      - cpr_net
    mem_limit: 8g
    memswap_limit: 8g
    cpus: 2.0

networks:
  cpr_net:
    driver: bridge
